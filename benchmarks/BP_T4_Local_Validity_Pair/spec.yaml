id: BP_T4_Local_Validity_Pair
branch: nonlinear
theorem_tier: T4
system_class: weakly_nonlinear_local_validity_pair
state_dimension: 3
formal_system: Paired weakly nonlinear fast-slow systems with the same structural template but different local-validity posture.
parameter_sets:
  reference:
    case_label: amplitude_breakdown
    epsilon: 0.04
    coupling: 0.04
  matched_local:
    case_label: matched_local
    epsilon: 0.08
