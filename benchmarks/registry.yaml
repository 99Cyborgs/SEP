- family_id: BP_T3_Window_Sensitivity_Pair
  title: T3 Window Sensitivity Pair
  branch: transport
  tier: T3
  phase: 2
  description: Paired positive-versus-mixed transport family exposing window dependence and coherent carrier failure geometry.
  system_class: finite_time_transport_window_sensitivity_pair
  state_dimension: 24
  formal_system: Paired windowed row-stochastic transport flows with matched geometry but different drift persistence across
    analysis windows.
  implementation_status: complete
  evidence_class: synthetic_counterexample
  claim_refs:
  - T3_finite_time_transport
  observables:
  - singular_gap
  - coherent_projector_deformation
  - autonomy_horizon
  - transportability_metrics
  fixtures: &id005 []
  expected_failure_modes:
  - horizon_failure
  - carrier_failure
  - window_selection_failure
  run_modes:
  - sample_parameters
  - run_case
  tags:
  - synthetic
  - transport
  - counterexample
  ground_truth_notes:
  - Both branches use the same ring transport construction and coarse subsystem partition.
  - The positive branch preserves coherent carriers across adjacent windows strongly enough to beat the frozen surrogate.
  - The fast-drift branch keeps plausible transport structure while degrading coherent persistence and regrouping stability.
  - The pair is intended as Paper B protocol evidence, not as a general cocycle theorem.
  spec_path: benchmarks/BP_T3_Window_Sensitivity_Pair/spec.yaml
  readme_path: benchmarks/BP_T3_Window_Sensitivity_Pair/README.md
