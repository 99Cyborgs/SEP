- family_id: BP_Linear_Two_Block
  title: Linear Two Block
  branch: linear
  tier: T1
  phase: 1
  description: Exact planted linear block ODEs with weak slow-block coupling.
  system_class: autonomous_linear
  state_dimension: 8
  formal_system: Q^T (diag(L_slow, L_fast) + R_slow) Q with planted 4-dimensional slow carrier.
  implementation_status: complete
  evidence_class: synthetic_constructive
  claim_refs:
  - T1_linear_autonomous
  observables:
  - spectral_gap
  - projector_deformation
  - block_residual_norm
  - leakage_trajectory
  - autonomy_horizon
  fixtures: &id001 []
  expected_failure_modes:
  - gap_failure
  - carrier_failure
  - coupling_failure
  - numerical_artifact_failure
  run_modes:
  - sample_parameters
  - run_case
