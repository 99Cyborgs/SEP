schema_version: 2
registry_role: canonical_benchmark_registry
claims:
- claim_id: T1_linear_autonomous
  title: Spectrally isolated slow carriers support weakly coupled reduced autonomous dynamics.
  claim_document_path: docs/theorem_notes/T1_linear_autonomous.tex
  gate: G1
  observables:
  - spectral_gap
  - projector_deformation
  - block_residual_norm
  - autonomy_horizon
  tags:
  - linear
  - autonomous
  - theorem
- claim_id: T2_nonnormal
  title: Nonnormal geometry can dominate benchmark validity even when eigenvalue gaps appear benign.
  claim_document_path: docs/theorem_notes/T2_nonnormal.tex
  gate: G2
  observables:
  - spectral_gap
  - transient_amplification_score
  - pseudospectral_proxy
  - numerical_refinement_metrics
  tags:
  - nonnormal
  - transient-growth
  - theorem
- claim_id: T3_finite_time_transport
  title: Finite-time coherent transport yields benchmarkable subsystem evidence through windowed operators.
  claim_document_path: docs/theorem_notes/T3_finite_time_transport.tex
  gate: G3
  observables:
  - singular_gap
  - coherent_projector_deformation
  - autonomy_horizon
  - leakage_trajectory
  tags:
  - transport
  - finite-time
  - theorem
- claim_id: T4_weakly_nonlinear
  title: Weakly nonlinear extensions remain valid only within explicitly diagnosed local carriers.
  claim_document_path: docs/theorem_notes/T4_weakly_nonlinear.tex
  gate: G4
  observables:
  - projector_deformation
  - local_validity_metrics
  - autonomy_horizon
  tags:
  - nonlinear
  - local-validity
  - theorem
- claim_id: T5_stochastic
  title: Stochastic subsystem claims require explicit uncertainty bounds and confidence-limited horizons.
  claim_document_path: docs/theorem_notes/T5_stochastic.tex
  gate: G5
  observables:
  - ensemble_averaged_leakage
  - leakage_variance
  - stochastic_uncertainty_metrics
  - autonomy_horizon
  tags:
  - stochastic
  - uncertainty
  - theorem
- claim_id: G6_application_identifiability
  title: Application-facing subsystem claims remain governed only when reproducibility, refinement, and negative controls
    are explicit.
  claim_document_path: docs/protocols/external_application_evidence.md
  gate: G6
  observables:
  - singular_gap
  - coherent_projector_deformation
  - autonomy_horizon
  - block_residual_norm
  tags:
  - application
  - identifiability
  - validation
