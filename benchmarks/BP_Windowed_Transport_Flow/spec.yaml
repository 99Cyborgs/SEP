id: BP_Windowed_Transport_Flow
branch: transport
theorem_tier: T3
system_class: finite_time_transport
state_dimension: 24
formal_system: Windowed row-stochastic transport flow with two coherent lobes on a ring.
parameter_ranges:
  grid_size: [24, 64]
  window_count: [4, 12]
  base_shift: [0.6, 1.2]
  phase_increment: [0.7, 1.3]
  diffusion: [1.0, 4.0]
  coherent_strength: [1.5, 3.0]
ground_truth_notes:
  - Two coherent lobes persist while drifting across windows.
  - Frozen autonomous surrogates are intentionally weaker than the coherent-window treatment.
  - The accepted positive reference uses moderate drift rather than a nearly stationary flow.
  - Parameter regimes that preserve singular gaps but destroy window-to-window carrier alignment are treated as negative transport evidence.
expected_failure_modes:
  - gap_failure
  - horizon_failure
  - carrier_failure
primary_observables:
  - singular_gap
  - coherent_projector_deformation
  - block_residual_norm
  - leakage_trajectory
  - autonomy_horizon
