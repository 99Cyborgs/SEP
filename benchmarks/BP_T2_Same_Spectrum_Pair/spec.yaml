id: BP_T2_Same_Spectrum_Pair
branch: nonnormal
theorem_tier: T2
system_class: matched_spectrum_nonnormal_pair
state_dimension: 4
formal_system: Two autonomous linear systems with matched retained slow eigenvalues but different slow-block geometry.
parameter_sets:
  reference:
    case_label: matched_nonnormal
    pairing_rule: same retained eigenvalues, upper-triangular slow block
  matched_normal:
    case_label: matched_normal
    pairing_rule: same retained eigenvalues, rotated normal slow block
ground_truth_notes:
  - The retained slow eigenvalues are held fixed across the pair.
  - The paired systems differ in slow-block geometry rather than nominal gap scale.
  - The purpose is to expose failure geometry for Paper C, not to close T2.
expected_failure_modes:
  - transient_growth_failure
  - horizon_failure
primary_observables:
  - spectral_gap
  - transient_amplification_score
  - pseudospectral_proxy
  - leakage_trajectory
  - autonomy_horizon
